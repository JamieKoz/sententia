"$schema" = "./node_modules/wrangler/config-schema.json"

name = "cinematch"
compatibility_date = "2026-04-12"

main = "./worker/index.ts"

[assets]
not_found_handling = "single-page-application"
run_worker_first = [ "/api/*" ]

[observability]
enabled = true

# Rate limiting (per-IP daily AI cap). Create namespaces, then paste IDs:
#   npx wrangler kv namespace create RATE_KV
#   npx wrangler kv namespace create RATE_KV --preview
[[kv_namespaces]]
binding = "RATE_KV"
id = "1ad424ad842f413aa65877cdd5024586"
preview_id = "d29d5a57fa484536bb1637389357f95b"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "DailyRateLimiter"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "GroupRoomCoordinator"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DailyRateLimiter"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["GroupRoomCoordinator"]
