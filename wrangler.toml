"$schema" = "./node_modules/wrangler/config-schema.json"

# --- DEFAULT / STAGING ENVIRONMENT ---
# Running `npx wrangler deploy` targets this.
name = "sententia"
compatibility_date = "2026-04-12"
main = "./worker/index.ts"

[assets]
not_found_handling = "single-page-application"
run_worker_first = [ "/api/*" ]

[observability]
enabled = true

# Staging KV (Keep this or create a separate staging KV)
[[kv_namespaces]]
binding = "RATE_KV"
id = "1ad424ad842f413aa65877cdd5024586" 

# --- PRODUCTION ENVIRONMENT ---
# Running `npx wrangler deploy --env production` targets this.
[env.production]
name = "sententia-production"

# This forces production to ONLY map to your custom domain
routes = [
  { pattern = "sententia.tv/*", custom_domain = true }
]

# Production KV namespace (Ideally a separate production KV ID)
[[env.production.kv_namespaces]]
binding = "RATE_KV"
id = "YOUR_PRODUCTION_KV_ID_HERE" 

# Define your production Durable Objects / Migrations if needed
[[env.production.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "DailyRateLimiter"

[[env.production.durable_objects.bindings]]
name = "ROOMS"
class_name = "GroupRoomCoordinator"
